<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N-Vezir Problemi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>N-Vezir Problemi</h1>
      <p>Girilen N değeri için tüm çözümleri bulur ve satranç tahtasında gösterir.</p>
    </header>

    <section class="controls card">
      <div class="input-group">
        <label for="nValue">N değeri</label>
        <input id="nValue" type="number" min="1" value="4" />
      </div>

      <div class="actions">
        <button id="solveBtn">Çözümleri Bul</button>
        <button id="prevBtn" disabled>Önceki Çözüm</button>
        <button id="nextBtn" disabled>Sonraki Çözüm</button>
      </div>
    </section>

    <section class="status card">
      <p id="infoLabel">Henüz çözüm oluşturulmadı.</p>
    </section>

    <section class="board-wrapper card">
      <div id="board" class="board"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
