<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N-Vezir Problemi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Algoritma Görselleştirme</p>
        <h1>N-Vezir Problemi Çözücü</h1>
        <p class="subtitle">
          Girilen N değeri için tüm geçerli yerleşimleri hesaplar ve çözümleri satranç tahtasında gösterir.
        </p>
      </div>
    </header>

    <main class="layout">
      <section class="panel controls-panel">
        <h2>Kontroller</h2>

        <label for="nValue" class="label">N değeri</label>
        <div class="input-row">
          <input id="nValue" type="number" min="1" max="12" value="4" />
          <button id="solveBtn">Çözümleri Bul</button>
        </div>

        <p class="hint">
          Tarayıcıda akıcı çalışması için önerilen aralık: <strong>1 - 12</strong>
        </p>

        <div class="stats">
          <div class="stat-card">
            <span class="stat-label">Toplam Çözüm</span>
            <strong id="totalSolutions">-</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Gösterilen</span>
            <strong id="currentSolution">-</strong>
          </div>
        </div>

        <p id="infoText" class="info-text">Henüz çözüm oluşturulmadı.</p>

        <div class="nav-buttons">
          <button id="prevBtn" disabled>Önceki Çözüm</button>
          <button id="nextBtn" disabled>Sonraki Çözüm</button>
        </div>
      </section>

      <section class="panel board-panel">
        <div class="board-header">
          <h2>Satranç Tahtası</h2>
          <span class="badge" id="boardSizeBadge">N = 4</span>
        </div>

        <div id="boardWrapper" class="board-wrapper">
          <div id="board" class="board" aria-label="N-Vezir satranç tahtası"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
